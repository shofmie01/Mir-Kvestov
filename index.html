<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Квесты в реальности | Мир приключений</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="antialiased">
    <header
      class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-purple-100 shadow-sm dark:bg-gray-800/80 dark:border-gray-700"
    >
      <div
        class="container mx-auto px-5 lg:px-8 py-3 flex items-center justify-between flex-wrap"
      >
        <a href="index.html" class="flex items-center space-x-2">
          <i
            class="fas fa-dungeon text-3xl text-purple-600 dark:text-purple-400"
          ></i>
          <span
            class="font-bold text-xl tracking-tight bg-gradient-to-r from-purple-700 to-violet-500 bg-clip-text text-transparent dark:from-purple-400 dark:to-violet-300"
            >Квест<span class="text-gray-800 dark:text-gray-200"
              >Локатор</span
            ></span
          >
        </a>
        <nav
          class="hidden md:flex items-center space-x-7 text-gray-700 font-medium dark:text-gray-200"
        >
          <a
            href="index.html"
            class="hover:text-purple-600 transition dark:hover:text-purple-400"
            >Главная</a
          >
          <a
            href="auth.html"
            class="hover:text-purple-600 transition dark:hover:text-purple-400"
            >Вход / Регистрация</a
          >
          <a
            href="city.html"
            class="hover:text-purple-600 transition dark:hover:text-purple-400"
            >Выбор города</a
          >
          <a
            href="news.html"
            class="hover:text-purple-600 transition dark:hover:text-purple-400"
            >Новости</a
          >
        </nav>
        <div class="flex items-center gap-3">
          <div
            class="hidden md:flex items-center gap-1 bg-purple-50 px-3 py-1.5 rounded-full text-sm text-purple-700 dark:bg-purple-900/50 dark:text-purple-300"
          >
            <i
              class="fas fa-map-marker-alt text-purple-500 text-xs dark:text-purple-400"
            ></i>
            <span class="city-display">Альметьевск</span>
          </div>
          <button
            id="themeToggle"
            class="text-purple-700 dark:text-purple-400 text-xl focus:outline-none"
          >
            <i id="themeIcon" class="fas fa-moon"></i>
          </button>
          <button
            id="menuToggle"
            class="md:hidden text-2xl text-purple-700 dark:text-purple-400 focus:outline-none"
          >
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="mobile-menu md:hidden bg-white/95 backdrop-blur-md px-5 pb-2 border-b border-purple-100 dark:bg-gray-800/95 dark:border-gray-700"
      >
        <div class="flex flex-col space-y-3 pt-2 pb-3">
          <a
            href="index.html"
            class="py-2 text-gray-700 hover:text-purple-600 dark:text-gray-200 dark:hover:text-purple-400"
            >Главная</a
          >
          <a
            href="auth.html"
            class="py-2 text-gray-700 hover:text-purple-600 dark:text-gray-200 dark:hover:text-purple-400"
            >Вход / Регистрация</a
          >
          <a
            href="city.html"
            class="py-2 text-gray-700 hover:text-purple-600 dark:text-gray-200 dark:hover:text-purple-400"
            >Выбор города</a
          >
          <a
            href="news.html"
            class="py-2 text-gray-700 hover:text-purple-600 dark:text-gray-200 dark:hover:text-purple-400"
            >Новости</a
          >
          <div
            class="flex items-center gap-2 pt-2 text-sm text-purple-700 border-t border-gray-100 mt-1 dark:text-purple-300 dark:border-gray-700"
          >
            <i class="fas fa-map-marker-alt"></i>
            <span class="city-display">Альметьевск</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-5 lg:px-8 py-8 md:py-12">
      <div id="appContent"></div>
    </main>

    <footer
      class="bg-white border-t border-purple-100 mt-12 py-8 dark:bg-gray-900 dark:border-gray-800"
    >
      <div
        class="container mx-auto px-5 lg:px-8 text-center text-gray-500 text-sm dark:text-gray-400"
      >
        <div class="flex flex-wrap justify-center gap-6 mb-3">
          <span
            ><i class="fas fa-phone-alt text-purple-400 mr-1"></i> +7 (843)
            555-22-33</span
          >
          <span
            ><i class="fas fa-envelope text-purple-400 mr-1"></i>
            quest@questlocator.ru</span
          >
          <span
            ><i class="fas fa-shield-alt text-purple-400 mr-1"></i> Квесты в
            реальности</span
          >
        </div>
        <p>
          © 2025 КвестЛокатор — лучшие квесты в твоем городе. Все права
          защищены.
        </p>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
